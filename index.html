<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aditya Narayan Singh | Landing Page</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
      overflow:hidden;
      color:white;
    }

    .background-circles div{
      position:absolute;
      border-radius:50%;
      background:rgba(255,255,255,0.08);
      animation:float 10s infinite linear;
    }

    .background-circles div:nth-child(1){
      width:120px;
      height:120px;
      left:10%;
      top:20%;
    }

    .background-circles div:nth-child(2){
      width:180px;
      height:180px;
      right:15%;
      top:10%;
      animation-duration:14s;
    }

    .background-circles div:nth-child(3){
      width:90px;
      height:90px;
      left:20%;
      bottom:10%;
      animation-duration:8s;
    }

    .background-circles div:nth-child(4){
      width:150px;
      height:150px;
      right:20%;
      bottom:15%;
      animation-duration:12s;
    }

    .card{
      position:relative;
      z-index:2;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(10px);
      padding:40px;
      border-radius:20px;
      text-align:center;
      width:350px;
      box-shadow:0 0 25px rgba(0,0,0,0.4);
      animation:fadeIn 2s ease;
    }

    h1{
      font-size:38px;
      margin-bottom:15px;
      animation:slideDown 1.5s ease;
    }

    .typing{
      overflow:hidden;
      white-space:nowrap;
      border-right:3px solid white;
      width:0;
      margin:auto;
      animation:typing 3s steps(20,end) forwards,
                 blink 0.8s infinite;
    }

    .skills{
      margin-top:25px;
    }

    .skills span{
      display:inline-block;
      margin:8px;
      padding:10px 20px;
      border-radius:30px;
      background:#38bdf8;
      color:black;
      font-weight:bold;
      transition:0.4s;
    }

    .skills span:hover{
      transform:scale(1.15) rotate(5deg);
      background:white;
    }

    .contact{
      margin-top:25px;
      font-size:16px;
      color:#e2e8f0;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:scale(0.8);
      }
      to{
        opacity:1;
        transform:scale(1);
      }
    }

    @keyframes slideDown{
      from{
        transform:translateY(-60px);
        opacity:0;
      }
      to{
        transform:translateY(0);
        opacity:1;
      }
    }

    @keyframes typing{
      from{
        width:0;
      }
      to{
        width:100%;
      }
    }

    @keyframes blink{
      50%{
        border-color:transparent;
      }
    }

    @keyframes float{
      0%{
        transform:translateY(0px) rotate(0deg);
      }
      50%{
        transform:translateY(-30px) rotate(180deg);
      }
      100%{
        transform:translateY(0px) rotate(360deg);
      }
    }

  </style>
</head>

<body>

  <div class="background-circles">
    <div></div>
    <div></div>
    <div></div>
    <div></div>
  </div>

  <div class="card">
    <h1>ADITYA NARAYAN SINGH</h1>

    <p class="typing">Frontend Developer</p>

    <div class="skills">
      <span>HTML</span>
      <span>CSS</span>
    </div>

    <div class="contact">
      <p>Contact:</p>
      <p>shansingh0907@gmail.com</p>
    </div>
  </div>

</body>
</html>
